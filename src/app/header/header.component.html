<header class="app-navbar navbar navbar-expand-lg navbar-dark">
  <a class="navbar-brand font-weight-bold" routerLink="/inicio">{{ title }}</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navMain"
          aria-controls="navMain" aria-expanded="false" aria-label="Menú">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="navMain">
    <ul class="navbar-nav mr-auto" *ngIf="loginService.isLoggedIn()">
      <li class="nav-item" routerLinkActive="active">
        <a class="nav-link" routerLink="/inicio">Inicio</a>
      </li>
      <li class="nav-item" routerLinkActive="active">
        <a class="nav-link" routerLink="/clientes">Clientes</a>
      </li>
      <li class="nav-item" routerLinkActive="active">
        <a class="nav-link" routerLink="/compras-ventas">Compras / ventas</a>
      </li>
      <li class="nav-item" routerLinkActive="active">
        <a class="nav-link" routerLink="/materiales">Materiales</a>
      </li>
      <li class="nav-item" routerLinkActive="active">
        <a class="nav-link" routerLink="/retiros">Retiros</a>
      </li>
      <li class="nav-item" routerLinkActive="active">
        <a class="nav-link" routerLink="/reciclaje">Reciclaje</a>
      </li>
      <li class="nav-item" routerLinkActive="active">
        <a class="nav-link" routerLink="/reportes">Reportes</a>
      </li>
      <li class="nav-item" routerLinkActive="active" *ngIf="loginService.isAdmin()">
        <a class="nav-link" routerLink="/admin/usuarios">Usuarios</a>
      </li>
      <li class="nav-item" routerLinkActive="active" *ngIf="loginService.isAdmin()">
        <a class="nav-link" routerLink="/signup">Alta usuario</a>
      </li>
    </ul>
    <ul class="navbar-nav ml-auto align-items-lg-center">
      <li class="nav-item mr-lg-3" *ngIf="loginService.isLoggedIn()">
        <span class="navbar-text small text-white-50">{{ nombreUsuario() }}</span>
      </li>
      <li class="nav-item" *ngIf="!loginService.isLoggedIn()">
        <a class="nav-link" routerLink="/login">Iniciar sesión</a>
      </li>
      <li class="nav-item" *ngIf="!loginService.isLoggedIn()">
        <a class="nav-link" routerLink="/signup">Registrarse</a>
      </li>
      <li class="nav-item" *ngIf="loginService.isLoggedIn()">
        <button type="button" class="btn btn-sm btn-outline-light ml-lg-2" (click)="salir()">Salir</button>
      </li>
    </ul>
  </div>
</header>
