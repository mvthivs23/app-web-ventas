<div class="auth-layout">
  <div class="auth-card auth-card--login">
    <div class="auth-card__badge">EcoRecicla</div>
    <h1 class="auth-brand">Acceso al sistema</h1>
    <p class="auth-sub">Inicie sesión con su cuenta corporativa</p>

    <form (ngSubmit)="iniciarSesion()" #f="ngForm" class="auth-form">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Usuario</mat-label>
        <input matInput id="username" name="username" [(ngModel)]="loginData.username"
               required autocomplete="username" [disabled]="cargando">
      </mat-form-field>
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Contraseña</mat-label>
        <input matInput id="password" name="password" type="password" [(ngModel)]="loginData.password"
               required autocomplete="current-password" [disabled]="cargando">
      </mat-form-field>

      <button mat-flat-button color="primary" class="auth-submit w-100" type="submit"
              [disabled]="!f.form.valid || cargando">
        <span *ngIf="!cargando">Entrar</span>
        <span *ngIf="cargando" class="d-inline-flex align-items-center justify-content-center">
          <mat-progress-spinner diameter="22" mode="indeterminate" class="auth-spinner"></mat-progress-spinner>
          <span class="ml-2">Validando…</span>
        </span>
      </button>
    </form>

    <p class="auth-footer text-center mt-3 mb-0">
      ¿No tiene cuenta? <a routerLink="/signup">Crear cuenta</a>
    </p>
  </div>
</div>
